name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run knip
      - run: pnpm run build
      - run: pnpm run publint
      - run: pnpm run attw
      - run: pnpm test -- run
      - run: pnpm audit --prod --audit-level high
      # Dogfood the built binary — catches CLI/exit-code/packaging regressions.
      - run: node dist/cli.mjs --version
      - run: node dist/cli.mjs --help
      - run: node dist/cli.mjs --eval-file ./examples/cli-test.ts --dry-run
      # Emit real JUnit + JSON artifacts from a committed fixture (no API key).
      - run: pnpm dlx tsx tests/fixtures/emit-artifacts.ts ./ci-artifacts
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: eval-results
          path: ci-artifacts/
          if-no-files-found: error
